name: Mirror Brandalyze Frontend to Public Repo

on: 
  push:
    branches: [ main ]

jobs: 
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source repo
        uses: actions/checkout@v4

      - name: push frontend to public repo
        env:
          PUBLIC_REPO: https://github.com/iwaju-labs/brandalyze-frontend.git
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          cd apps/frontend
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Mirror frontend from monorepo"
          git branch -M main
          git remote add origin https://$PUBLIC_REPO_TOKEN@github.com/iwaju-labs/brandalyze-frontend.git
          git push -f origin main
