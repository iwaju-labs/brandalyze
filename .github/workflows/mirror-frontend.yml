name: Mirror Brandalyze Frontend to Public Repo

on: 
  push:
    branches: [ main ]

jobs: 
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: push frontend to public repo preserve history
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |          # Configure git user with organization name
          git config --global user.name "iwaju-labs"
          git config --global user.email "worshipgbadamosi@live.com"
          
          # Add public repo remote with token authentication
          git remote add public https://$PUBLIC_REPO_TOKEN@github.com/iwaju-labs/brandalyze-frontend.git
          
          # Create a new orphan branch for the frontend-only content
          git checkout --orphan frontend-mirror
          
          # Remove all files except frontend
          git rm -rf . || true
          git clean -fxd || true
          
          # Copy frontend files to root
          cp -r apps/frontend/* . 2>/dev/null || true
          cp -r apps/frontend/.* . 2>/dev/null || true
          
          # Add all frontend files
          git add .
          
          # Commit the frontend-only content
          git commit -m "Mirror frontend from main branch - $(date)"
          
          # Force push to public repo main branch
          git push public frontend-mirror:main --force
