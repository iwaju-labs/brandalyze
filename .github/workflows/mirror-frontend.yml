name: Mirror Brandalyze Frontend to Public Repo

on: 
  push:
    branches: [ main ]

jobs: 
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: push frontend to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Configure git user with organization name
          git config --global user.name "iwaju-labs"
          git config --global user.email "worshipgbadamosi@live.com"
          
          # Create a temporary directory for frontend files
          mkdir -p /tmp/frontend-only
          
          # Copy frontend files to temporary directory, placing them at root level
          cp -r apps/frontend/* /tmp/frontend-only/ 2>/dev/null || true
          cp apps/frontend/.gitignore /tmp/frontend-only/ 2>/dev/null || true
          cp apps/frontend/.eslintrc* /tmp/frontend-only/ 2>/dev/null || true
            # Create a new git repository in the temp directory
          cd /tmp/frontend-only
          git init
          git config user.name "iwaju-labs"
          git config user.email "worshipgbadamosi@live.com"
          
          # Set default branch to main
          git config init.defaultBranch main
          git checkout -b main
          
          # Add all frontend files
          git add .
          
          # Commit the frontend files
          git commit -m "Mirror frontend from main branch - $(date)"
          
          # Add the public repo as remote and push
          git remote add origin https://$PUBLIC_REPO_TOKEN@github.com/iwaju-labs/brandalyze-frontend.git
          git push origin main --force
