<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Authentication</title>    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e3e3e3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        p {
            margin: 0;
            line-height: 1.6;
            color: #666;
        }
        .success {
            color: #27ae60;
        }
        .error {
            color: #e74c3c;
        }
        a {
            color: #667eea !important;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="status">Connecting Your Account</h2>
        <p id="message">Please wait while we securely link your account to the browser extension.</p>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const messageEl = document.getElementById('message');
        const spinnerEl = document.getElementById('spinner');        function showSuccess() {
            spinnerEl.style.display = 'none';
            statusEl.textContent = '🎉 Successfully Connected!';
            statusEl.className = 'success';
            messageEl.textContent = 'Your extension is now linked to your account. Start analyzing brand voice on LinkedIn and Twitter!';
            setTimeout(() => window.close(), 3000);
        }function showError(errorMsg) {
            spinnerEl.style.display = 'none';
            
            // Check for subscription-related errors
            if (errorMsg && (errorMsg.includes('subscription') || errorMsg.includes('Pro or Enterprise') || errorMsg.includes('upgrade'))) {
                statusEl.textContent = 'Upgrade Required';
                statusEl.className = 'error';
                messageEl.innerHTML = `
                    <strong>Browser extension requires Pro or Enterprise subscription</strong><br><br>
                    <a href="https://brandalyze.io/pricing" target="_blank" style="color: #3498db; text-decoration: none;">
                        → View Pricing Plans
                    </a><br>
                    <small style="color: #666; margin-top: 10px; display: block;">
                        You can close this tab when ready.
                    </small>
                `;
            } else {
                statusEl.textContent = 'Connection Failed';
                statusEl.className = 'error';
                messageEl.textContent = errorMsg || 'Unable to connect to your account. Please try again or contact support.';
            }
        }

        // Extract auth code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const authCode = urlParams.get('code');

        if (!authCode) {
            showError('No authentication code found in URL');
        } else {
            // Send auth code to background script
            chrome.runtime.sendMessage({
                action: 'handleAuthCallback',
                authCode: authCode
            }, (response) => {
                if (chrome.runtime.lastError) {
                    showError('Failed to communicate with extension');
                    return;
                }

                if (response && response.success) {
                    showSuccess();
                } else {
                    showError(response?.error || 'Authentication failed');
                }
            });
        }
    </script>
</body>
</html>
